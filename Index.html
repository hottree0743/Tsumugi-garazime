<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大島紬 柄締め管理 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { border-bottom: 4px solid #4f46e5; color: #4f46e5; }
        .num-btn.selected { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        /* 編集モーダル用 */
        #edit-modal { display: none; }
        #edit-modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <header class="bg-indigo-900 text-white p-4 shadow-md sticky top-0 z-30">
        <h1 id="header-project-title" class="text-lg font-bold italic">データを選択してください</h1>
        <p id="header-project-info" class="text-xs opacity-80">---</p>
    </header>

    <main id="tab-work" class="tab-content p-4 active">
        <div id="work-ui" class="hidden">
            <section class="bg-white p-4 rounded-xl shadow-sm mb-4 border-l-4 border-indigo-500">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-sm text-gray-500 font-bold">進行状況</span>
                    <span class="text-2xl font-black text-indigo-600"><span id="work-current">0</span> / <span id="work-target">0</span> <small class="text-xs">枚</small></span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden mb-2">
                    <div id="work-progress-bar" class="bg-indigo-500 h-4 transition-all duration-700" style="width: 0%"></div>
                </div>
                <p id="work-eta" class="text-sm text-right text-indigo-500 font-black">完成予定: 計算中...</p>
            </section>

            <section class="grid grid-cols-3 gap-2 mb-4">
                <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-100 text-center">
                    <p class="text-[10px] text-gray-400">日平均枚数</p>
                    <p id="work-avg-count" class="text-sm font-bold text-gray-700">-枚</p>
                </div>
                <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-100 text-center">
                    <p class="text-[10px] text-gray-400">平均作業時間</p>
                    <p id="work-avg-time" class="text-sm font-bold text-gray-700">-h</p>
                </div>
                <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-100 text-center">
                    <p class="text-[10px] text-gray-400">作業速度</p>
                    <p id="work-speed" class="text-sm font-bold text-gray-700">-枚/h</p>
                </div>
            </section>

            <section class="mb-4">
                <h3 class="text-xs font-bold text-gray-500 mb-2">枚数選択</h3>
                <div class="grid grid-cols-5 gap-2">
                    <script>
                        for(let i=1; i<=10; i++) {
                            document.write(`<button onclick="selectCount(${i}, this)" class="num-btn bg-white border-2 border-gray-100 py-3 rounded-lg font-bold shadow-sm">${i}</button>`);
                        }
                    </script>
                </div>
            </section>

            <section class="bg-white p-3 rounded-xl shadow-sm mb-4 flex gap-4">
                <div class="flex-1 text-center">
                    <label class="text-[10px] text-gray-400 block mb-1">開始時間</label>
                    <input type="time" id="work-start" value="08:30" class="w-full text-md font-bold text-center bg-gray-50 rounded">
                </div>
                <div class="flex-1 text-center border-l pl-4">
                    <label class="text-[10px] text-gray-400 block mb-1">終了時間</label>
                    <input type="time" id="work-end" value="17:00" class="w-full text-md font-bold text-center bg-gray-50 rounded">
                </div>
            </section>

            <button onclick="saveWork()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-xl shadow-lg active:scale-95 transition-transform">保存</button>

            <div id="char-msg-box" class="mt-4 bg-yellow-50 border border-yellow-200 p-3 rounded-xl hidden flex items-center gap-3">
                <div class="text-xl">👵</div>
                <p id="char-text" class="text-xs text-yellow-800 font-bold"></p>
            </div>
        </div>
        <div id="work-empty" class="text-center py-20 text-gray-400 font-bold">管理タブから柄を選択してください</div>
    </main>

    <main id="tab-history" class="tab-content p-4">
        <h2 class="font-bold text-gray-700 mb-4">製造履歴</h2>
        <div id="history-selector" class="space-y-2 mb-6"></div>
        <div id="history-detail" class="hidden bg-white p-4 rounded-xl shadow-md border-t-4 border-indigo-600">
            <h3 id="hist-title" class="font-black text-gray-800 mb-4 text-center border-b pb-2"></h3>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between border-b py-1"><span>製造開始日</span><span id="hist-start" class="font-bold"></span></div>
                <div class="flex justify-between border-b py-1"><span>製造完了日</span><span id="hist-end" class="font-bold"></span></div>
                <div class="flex justify-between border-b py-1"><span>日平均枚数</span><span id="hist-avg-count" class="font-bold"></span></div>
                <div class="flex justify-between border-b py-1"><span>合計作業日数</span><span id="hist-total-days" class="font-bold"></span></div>
                <div class="flex justify-between border-b py-1"><span>日平均作業時間</span><span id="hist-avg-time" class="font-bold"></span></div>
                <div class="flex justify-between py-1"><span>作業速度</span><span id="hist-speed" class="font-bold text-indigo-600"></span></div>
            </div>
        </div>
    </main>

    <main id="tab-analysis" class="tab-content p-4">
        <h2 class="font-bold text-gray-700 mb-4">ムシロ種類別 分析</h2>
        <div id="type-analysis-list" class="space-y-4"></div>
    </main>

    <main id="tab-manage" class="tab-content p-4">
        <div class="bg-white p-4 rounded-xl shadow-md mb-6 border-2 border-indigo-100">
            <h2 class="font-bold text-indigo-900 mb-4 border-b">新規プロジェクト登録</h2>
            <div class="space-y-4">
                <input type="text" id="m-name" placeholder="柄の名前（例：龍郷）" class="w-full border-b p-2 outline-none focus:border-indigo-500">
                <select id="m-type" class="w-full border-b p-2 bg-white">
                    <option value="絣経糸">絣経糸 (150枚)</option>
                    <option value="絣緯糸">絣緯糸 (200枚)</option>
                    <option value="地緯糸">地緯糸 (200枚)</option>
                </select>
                <div class="flex items-center gap-2 text-sm">
                    <label class="text-gray-400">目標枚数:</label>
                    <input type="number" id="m-target" value="150" class="border-b w-20 text-center font-bold">
                </div>
                <button onclick="addProject()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-md active:bg-indigo-700">新規作成</button>
            </div>
        </div>

        <h2 class="font-bold text-gray-700 mb-2 text-sm uppercase px-1">進行中のデータ</h2>
        <div id="m-list" class="space-y-3"></div>
    </main>

    <div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6">
            <h3 class="font-black text-gray-800 mb-4">基本情報の再編集</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-400 font-bold">柄の名前</label>
                    <input type="text" id="edit-name" class="w-full border-b-2 border-indigo-100 p-2 outline-none focus:border-indigo-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 font-bold">ムシロの種類</label>
                    <select id="edit-type" class="w-full border-b-2 border-indigo-100 p-2 bg-white outline-none focus:border-indigo-500">
                        <option value="絣経糸">絣経糸</option>
                        <option value="絣緯糸">絣緯糸</option>
                        <option value="地緯糸">地緯糸</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 font-bold">目標枚数</label>
                    <input type="number" id="edit-target" class="w-full border-b-2 border-indigo-100 p-2 outline-none focus:border-indigo-500 font-bold">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-100 text-gray-500 py-3 rounded-xl font-bold">キャンセル</button>
                    <button onclick="updateProject()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">更新する</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 shadow-2xl z-30">
        <button onclick="switchTab('work')" id="nav-work" class="flex flex-col items-center flex-1 active-tab">
            <span class="text-[10px] font-bold">作業</span>
        </button>
        <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center flex-1 text-gray-400 border-l">
            <span class="text-[10px] font-bold">履歴</span>
        </button>
        <button onclick="switchTab('analysis')" id="nav-analysis" class="flex flex-col items-center flex-1 text-gray-400 border-l">
            <span class="text-[10px] font-bold">分析</span>
        </button>
        <button onclick="switchTab('manage')" id="nav-manage" class="flex flex-col items-center flex-1 text-gray-400 border-l">
            <span class="text-[10px] font-bold">管理</span>
        </button>
    </nav>

    <script>
        let projects = JSON.parse(localStorage.getItem('tsumugi_db')) || [];
        let activeId = localStorage.getItem('tsumugi_active_id') || null;
        let tempCount = 0;
        let editingId = null;

        const holidays2026 = ["2026/1/1", "2026/1/12", "2026/2/11", "2026/2/23", "2026/3/20", "2026/4/29", "2026/5/3", "2026/5/4", "2026/5/5", "2026/5/6", "2026/7/20", "2026/8/11", "2026/9/21", "2026/9/22", "2026/9/23", "2026/10/12", "2026/11/3", "2026/11/23"];

        function saveData() {
            localStorage.setItem('tsumugi_db', JSON.stringify(projects));
            localStorage.setItem('tsumugi_active_id', activeId);
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-indigo-600', 'text-gray-400'));
            document.getElementById('tab-'+name).classList.add('active');
            document.getElementById('nav-'+name).classList.add('active-tab', 'text-indigo-600');
            if(name === 'manage') renderManage();
            if(name === 'work') renderWork();
            if(name === 'history') renderHistorySelector();
            if(name === 'analysis') renderTypeAnalysis();
        }

        // --- 管理 ---
        function addProject() {
            const name = document.getElementById('m-name').value;
            if(!name) return alert("柄名を入力してください");
            const newProj = {
                id: Date.now(),
                no: projects.length + 1,
                name: name,
                type: document.getElementById('m-type').value,
                target: parseInt(document.getElementById('m-target').value),
                records: [],
                startDate: new Date().toLocaleDateString(),
                endDate: null
            };
            projects.push(newProj);
            activeId = newProj.id;
            saveData();
            document.getElementById('m-name').value = "";
            switchTab('work');
        }

        function renderManage() {
            const list = document.getElementById('m-list');
            list.innerHTML = projects.filter(p => !p.endDate).map(p => `
                <div class="flex gap-2 items-stretch">
                    <div onclick="selectProject(${p.id})" class="flex-1 p-4 bg-white border-2 ${activeId == p.id ? 'border-indigo-600 shadow-inner' : 'border-gray-100'} rounded-xl transition-all active:scale-95">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">No.${p.no} / ${p.type}</p>
                        <p class="font-black text-gray-800 text-lg">${p.name}</p>
                        <p class="text-[10px] text-indigo-500 font-bold">目標: ${p.target}枚</p>
                    </div>
                    <button onclick="openEditModal(${p.id})" class="bg-gray-200 text-gray-600 px-4 rounded-xl font-bold text-xs hover:bg-indigo-100 hover:text-indigo-600 transition-colors">
                        編集
                    </button>
                </div>
            `).reverse().join('');
        }

        function selectProject(id) {
            activeId = id;
            saveData();
            switchTab('work');
        }

        // --- 編集機能 ---
        function openEditModal(id) {
            editingId = id;
            const p = projects.find(x => x.id == id);
            document.getElementById('edit-name').value = p.name;
            document.getElementById('edit-type').value = p.type;
            document.getElementById('edit-target').value = p.target;
            document.getElementById('edit-modal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            editingId = null;
        }

        function updateProject() {
            const p = projects.find(x => x.id == editingId);
            if(!p) return;

            p.name = document.getElementById('edit-name').value;
            p.type = document.getElementById('edit-type').value;
            p.target = parseInt(document.getElementById('edit-target').value);

            saveData();
            closeEditModal();
            renderManage();
            alert("情報を更新しました");
        }

        // --- 作業 ---
        function selectCount(n, btn) {
            tempCount = n;
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function renderWork() {
            const p = projects.find(x => x.id == activeId);
            if(!p) {
                document.getElementById('work-ui').classList.add('hidden');
                document.getElementById('work-empty').classList.remove('hidden');
                document.getElementById('header-project-title').innerText = "データを選択してください";
                return;
            }
            document.getElementById('work-ui').classList.remove('hidden');
            document.getElementById('work-empty').classList.add('hidden');
            document.getElementById('header-project-title').innerText = `No.${p.no} ${p.name}`;
            document.getElementById('header-project-info').innerText = `${p.type} / 目標: ${p.target}枚`;

            const current = p.records.reduce((s, r) => s + r.count, 0);
            const totalHours = p.records.reduce((s, r) => s + r.hours, 0);
            const days = p.records.length;

            document.getElementById('work-current').innerText = current;
            document.getElementById('work-target').innerText = p.target;
            document.getElementById('work-progress-bar').style.width = Math.min(100, (current/p.target)*100) + '%';

            document.getElementById('work-avg-count').innerText = days > 0 ? (current / days).toFixed(1) + "枚" : "-枚";
            document.getElementById('work-avg-time').innerText = days > 0 ? (totalHours / days).toFixed(1) + "h" : "-h";
            document.getElementById('work-speed').innerText = totalHours > 0 ? (current / totalHours).toFixed(2) + "枚/h" : "-枚/h";

            calculateETA(p, current);
        }

        function saveWork() {
            if(tempCount === 0) return alert("枚数を選択してください");
            const p = projects.find(x => x.id == activeId);
            const start = document.getElementById('work-start').value;
            const end = document.getElementById('work-end').value;
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            const hours = (eh + em/60) - (sh + sm/60);

            p.records.push({ date: new Date().toLocaleDateString(), count: tempCount, hours: hours > 0 ? hours : 0 });

            const total = p.records.reduce((s, r) => s + r.count, 0);
            if(total >= p.target) p.endDate = new Date().toLocaleDateString();

            saveData();
            showCharMessage();
            tempCount = 0;
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            renderWork();
        }

        function showCharMessage() {
            const box = document.getElementById('char-msg-box');
            box.classList.remove('hidden');
            document.getElementById('char-text').innerText = "お疲れ様！保存しました。";
            setTimeout(() => box.classList.add('hidden'), 3000);
        }

        // --- 履歴 ---
        function renderHistorySelector() {
            const list = document.getElementById('history-selector');
            list.innerHTML = projects.map(p => `
                <button onclick="showHistoryDetail(${p.id})" class="w-full text-left p-3 bg-white border rounded-lg shadow-sm font-bold text-sm">
                    No.${p.no} ${p.name} ${p.type} ${p.endDate ? '✅' : '⏳'}
                </button>
            `).join('');
        }

        function showHistoryDetail(id) {
            const p = projects.find(x => x.id == id);
            const detail = document.getElementById('history-detail');
            detail.classList.remove('hidden');

            const current = p.records.reduce((s, r) => s + r.count, 0);
            const totalHours = p.records.reduce((s, r) => s + r.hours, 0);
            const days = p.records.length;

            document.getElementById('hist-title').innerText = `No.${p.no} ${p.name} (${p.type})`;
            document.getElementById('hist-start').innerText = p.startDate;
            document.getElementById('hist-end').innerText = p.endDate || "製造中";
            document.getElementById('hist-avg-count').innerText = days > 0 ? (current / days).toFixed(1) + " 枚" : "-";
            document.getElementById('hist-total-days').innerText = days + " 日";
            document.getElementById('hist-avg-time').innerText = days > 0 ? (totalHours / days).toFixed(1) + " 時間" : "-";
            document.getElementById('hist-speed').innerText = totalHours > 0 ? (current / totalHours).toFixed(2) + " 枚/時間" : "-";
            window.scrollTo(0, document.body.scrollHeight);
        }

        // --- 分析 ---
        function renderTypeAnalysis() {
            const types = ["絣経糸", "絣緯糸", "地緯糸"];
            const list = document.getElementById('type-analysis-list');

            list.innerHTML = types.map(type => {
                const finished = projects.filter(p => p.type.includes(type) && p.endDate);
                const avgDays = finished.length > 0
                    ? (finished.reduce((s, p) => s + p.records.length, 0) / finished.length).toFixed(1)
                    : "-";

                return `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                        <h3 class="font-bold text-gray-800">${type}</h3>
                        <div class="flex justify-between mt-2 items-end">
                            <span class="text-xs text-gray-400 font-bold">完成までにかかった平均日数</span>
                            <span class="text-xl font-black text-green-600">${avgDays} <small class="text-xs">日</small></span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateETA(p, current) {
            const remaining = p.target - current;
            if(p.records.length === 0 || remaining <= 0) {
                document.getElementById('work-eta').innerText = remaining <= 0 ? "完成！" : "完成予定: 計算中...";
                return;
            }
            const avg = current / p.records.length;
            let daysNeeded = Math.ceil(remaining / avg);
            let date = new Date();
            let count = 0;
            while(count < daysNeeded) {
                date.setDate(date.getDate() + 1);
                const day = date.getDay();
                const d = date.getDate();
                const ds = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
                const weekNum = Math.ceil(d / 7);
                let isWork = true;
                if(day === 0 || holidays2026.includes(ds)) isWork = false;
                if(day === 6 && weekNum >= 2 && weekNum <= 4) isWork = false;
                if(isWork) count++;
            }
            document.getElementById('work-eta').innerText = `完成予定: ${date.getMonth()+1}/${date.getDate()}`;
        }

        // 初期表示
        if(activeId) switchTab('work'); else switchTab('manage');
    </script>
</body>
</html>
